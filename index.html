<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5b2d0e" />
  <title>Misiones Julio 2026 · El Buen Pastor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="cabecera">
    <div class="cabecera-texto">
      <p class="sobretitulo">Arquidiócesis de Maracaibo · Parroquia "El Buen Pastor"</p>
      <h1>Misiones · 17 al 27 de julio</h1>
      <p class="subtitulo">Cronograma y turnos de los seminaristas</p>
    </div>
  </header>

  <nav class="tabs" aria-label="Secciones">
    <button class="tab activo" data-vista="dia">📅<span>Por día</span></button>
    <button class="tab" data-vista="mi">🙋<span>Mi turno</span></button>
    <button class="tab" data-vista="cronograma">🗓️<span>Cronograma</span></button>
    <button class="tab" data-vista="equipo">👥<span>Equipo</span></button>
  </nav>

  <main>
    <!-- Vista: Por día -->
    <section id="vista-dia" class="vista visible">
      <div id="selector-dias" class="selector-dias" aria-label="Elegir día"></div>
      <div id="vista-dia-detalle"></div>
    </section>

    <!-- Vista: Mi turno -->
    <section id="vista-mi" class="vista">
      <div id="selector-seminaristas" class="selector-seminaristas" aria-label="Elegir seminarista"></div>
      <div id="vista-mi-detalle"></div>
    </section>

    <!-- Vista: Cronograma completo -->
    <section id="vista-cronograma" class="vista">
      <div class="card">
        <h3>🗓️ Cronograma de las Misiones</h3>
        <div class="tabla-scroll">
          <table id="tabla-cronograma">
            <thead>
              <tr>
                <th>Día</th>
                <th>Actividad</th>
                <th>Responsables</th>
                <th>Alimentación</th>
                <th>Cocina</th>
                <th>Liturgia</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div id="notas-cronograma" class="card"></div>
    </section>

    <!-- Vista: Equipo -->
    <section id="vista-equipo" class="vista">
      <div id="vista-equipo-detalle"></div>
    </section>
  </main>

  <footer class="pie">
    Vicaría Episcopal Territorial Oeste · Archiprestazgo Nuestra Señora de Coromoto
  </footer>

  <script src="app.js"></script>
</body>
</html>
